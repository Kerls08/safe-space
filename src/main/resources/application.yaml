spring:
  application:
    name: safe-space

  # ── H2 In-Memory Database ──
  datasource:
    url: jdbc:h2:mem:safespace
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # ── H2 Console (accessible at /h2-console) ──
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: false

  # ── File Upload (Multipart) ──
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ── Server ──
server:
  port: 8080

# ── Logging ──
logging:
  level:
    com.safe.space: DEBUG
    org.springframework.web: INFO
